service: compliance-scanners

provider:
  name: aws
  runtime: python3.12
  region: ap-south-1
  environment:
    FINDINGS_TABLE: Findings
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:DeleteItem
        - dynamodb:DescribeTable
        - dynamodb:Scan
        - dynamodb:Query
        - dynamodb:UpdateItem
        - dynamodb:BatchWriteItem
        - dynamodb:GetItem
      Resource: "*"

    - Effect: Allow
      Action:
        - rds:DescribeDBInstances
        - rds:DescribeDBClusters
        - rds:DescribeDBClusterSnapshots
        - rds:DescribeDBSnapshots
        - rds:ListTagsForResource
      Resource: "*"

    - Effect: Allow
      Action:
        - cloudtrail:DescribeTrails
        - cloudtrail:GetTrailStatus
        - cloudtrail:GetEventSelectors
        - cloudtrail:ListTrails
      Resource: "*"

    - Effect: Allow
      Action:
        - apigateway:GET
      Resource: "*"

    - Effect: Allow
      Action:
        - wafv2:GetWebACLForResource
      Resource: "*"

    - Effect: Allow
      Action:
        - s3:ListAllMyBuckets
        - s3:GetBucketAcl
        - s3:GetBucketPolicy
        - s3:GetBucketEncryption
        - s3:GetBucketPublicAccessBlock
        - s3:GetBucketLocation
        - s3:GetBucketVersioning
        - s3:GetBucketLogging
        - s3:PutObject
        - s3:DeleteObject
        - s3:GetEncryptionConfiguration
      Resource: "*"

    - Effect: Allow
      Action:
        - ec2:DescribeInstances
        - ec2:DescribeSecurityGroups
      Resource: "*"

    - Effect: Allow
      Action:
        - lambda:InvokeFunction
      Resource: "*"

    - Effect: Allow
      Action:
        - iam:ListUsers
        - iam:ListAccessKeys
        - iam:GetLoginProfile
        - iam:ListMFADevices
        - iam:ListRoles
        - iam:ListAttachedRolePolicies
        - iam:ListRolePolicies
      Resource: "*"

    - Effect: Allow
      Action:
        - lambda:ListFunctions
        - lambda:GetFunction
        - lambda:GetFunctionConcurrency
        - lambda:GetPolicy
        - lambda:ListTags
      Resource: "*"

    - Effect: Allow
      Action:
        - sts:AssumeRole
      Resource: "arn:aws:iam::*:role/CrossAccountComplianceRole"

functions:

  # ═══════════════════════════════════════════════════════════════
  # AI-POWERED SECURITY ANALYZER
  # ═══════════════════════════════════════════════════════════════
  aiBrain:
    image:
      uri: 544446317130.dkr.ecr.ap-south-1.amazonaws.com/compliance-ai-analyzer:v13
    timeout: 60
    memorySize: 1024
    environment:
      GROQ_API_KEY: ${env:GROQ_API_KEY}
      GOOGLE_API_KEY: ${env:GOOGLE_API_KEY}
      PINECONE_API_KEY: ${env:PINECONE_API_KEY}
      PINECONE_INDEX_NAME: aws-compliance-rules

  # ═══════════════════════════════════════════════════════════════
  # SECURITY ASSISTANT (Groq + Pinecone RAG chat)
  # ═══════════════════════════════════════════════════════════════
  securityAssistant:
    image:
      uri: 544446317130.dkr.ecr.ap-south-1.amazonaws.com/compliance-security-assistant:latest
    timeout: 50
    memorySize: 512
    environment:
      GROQ_API_KEY: ${env:GROQ_API_KEY}
      GOOGLE_API_KEY: ${env:GOOGLE_API_KEY}
      PINECONE_API_KEY: ${env:PINECONE_API_KEY}
      PINECONE_INDEX_NAME: aws-compliance-rules
    events:
      - http:
          path: assistant
          method: post
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false
      - http:
          path: assistant
          method: options
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  # ═══════════════════════════════════════════════════════════════
  # MANUAL STATUS OVERRIDE — PATCH /findings/{findingId}/status
  # ═══════════════════════════════════════════════════════════════
  updateStatus:
    handler: lambdas/update_status/app.lambda_handler
    timeout: 10
    environment:
      FINDINGS_TABLE: Findings
    events:
      - http:
          path: findings/{findingId}/status
          method: patch
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false
      - http:
          path: findings/{findingId}/status
          method: options
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  # ═══════════════════════════════════════════════════════════════
  # SCAN ORCHESTRATOR
  # ═══════════════════════════════════════════════════════════════
  scanAll:
    handler: lambdas/scan_all/app.lambda_handler
    timeout: 60
    environment:
      FINDINGS_TABLE: Findings
      S3_SCANNER_FUNCTION:         compliance-scanners-dev-s3Scanner
      EC2_SCANNER_FUNCTION:        compliance-scanners-dev-ec2Scanner
      IAM_SCANNER_FUNCTION:        compliance-scanners-dev-iamScanner
      LAMBDA_SCANNER_FUNCTION:     compliance-scanners-dev-lambdaScanner
      RDS_SCANNER_FUNCTION:        compliance-scanners-dev-rdsScanner
      CLOUDTRAIL_SCANNER_FUNCTION: compliance-scanners-dev-cloudtrailScanner
      APIGW_SCANNER_FUNCTION:      compliance-scanners-dev-apigwScanner
    events:
      - http:
          path: scan
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  testLambda:
    handler: handler.hello
    events:
      - http:
          path: test
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  s3Scanner:
    handler: lambdas/s3_check/app.lambda_handler
    timeout: 60
    memorySize: 512
    environment:
      FINDINGS_TABLE: Findings
      AI_ANALYZER_FUNCTION: compliance-scanners-dev-aiBrain
    events:
      - http:
          path: scan/s3
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  ec2Scanner:
    handler: lambdas/ec2_check/app.lambda_handler
    timeout: 60
    memorySize: 512
    environment:
      FINDINGS_TABLE: Findings
      AI_ANALYZER_FUNCTION: compliance-scanners-dev-aiBrain
    events:
      - http:
          path: scan/ec2
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  iamScanner:
    handler: lambdas/iam_check/app.lambda_handler
    timeout: 60
    memorySize: 512
    environment:
      FINDINGS_TABLE: Findings
      AI_BRAIN_FUNCTION_NAME: compliance-scanners-dev-aiBrain
    events:
      - http:
          path: scan/iam
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  lambdaScanner:
    handler: lambdas/lambda_check/app.lambda_handler
    timeout: 60
    memorySize: 512
    environment:
      FINDINGS_TABLE: Findings
      AI_ANALYZER_FUNCTION: compliance-scanners-dev-aiBrain
    events:
      - http:
          path: scan/lambda
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  rdsScanner:
    handler: lambdas/rds_check/app.lambda_handler
    timeout: 60
    memorySize: 512
    environment:
      FINDINGS_TABLE: Findings
      AI_ANALYZER_FUNCTION: compliance-scanners-dev-aiBrain
    events:
      - http:
          path: scan/rds
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  cloudtrailScanner:
    handler: lambdas/cloudtrail_check/app.lambda_handler
    timeout: 60
    memorySize: 512
    environment:
      FINDINGS_TABLE: Findings
      AI_ANALYZER_FUNCTION: compliance-scanners-dev-aiBrain
    events:
      - http:
          path: scan/cloudtrail
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  apigwScanner:
    handler: lambdas/apigw_check/app.lambda_handler
    timeout: 60
    memorySize: 512
    environment:
      FINDINGS_TABLE: Findings
      AI_ANALYZER_FUNCTION: compliance-scanners-dev-aiBrain
    events:
      - http:
          path: scan/apigw
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

  getFindings:
    handler: lambdas/get_findings/app.lambda_handler
    environment:
      FINDINGS_TABLE: Findings
      CSV_BUCKET: csv-output-buckett
    events:
      - http:
          path: findings
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false
      - http:
          path: refresh
          method: get
          cors:
            origin: '*'
            headers: [Content-Type, X-Amz-Date, Authorization, X-Api-Key, X-Amz-Security-Token]
            allowCredentials: false

resources:
  Resources:
    FindingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Findings
        AttributeDefinitions:
          - AttributeName: findingId
            AttributeType: S
          # ── GSI attributes ─────────────────────────────────────
          - AttributeName: accountId
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: findingId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        # ── GSI: query all findings for an account by status ─────
        GlobalSecondaryIndexes:
          - IndexName: accountId-status-index
            KeySchema:
              - AttributeName: accountId
                KeyType: HASH
              - AttributeName: status
                KeyType: RANGE
            Projection:
              ProjectionType: ALL